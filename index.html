<!DOCTYPE html>
<html>
<head>
  <title>Online Exam System</title>
</head>
<body>

<h2>Admin Panel</h2>
<button onclick="addQuestion()">Add Question</button>

<h2>Questions (Students View)</h2>
<div id="questions">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAM_Y9vNlwPK_9ZJwmD6UVD4YMa2zoRYwk",
  authDomain: "hiis-sessional.firebaseapp.com",
  projectId: "hiis-sessional",
  storageBucket: "hiis-sessional.firebasestorage.app",
  messagingSenderId: "277834368099",
  appId: "1:277834368099:web:5dafea68e6a89a1efc6456",
  measurementId: "G-L78CPQC49R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 LOAD QUESTIONS (VISIBLE TO ALL USERS)
function loadQuestions() {
  onSnapshot(collection(db, "exams"), (snapshot) => {

    if (snapshot.empty) {
      document.getElementById("questions").innerHTML = "No questions yet";
      return;
    }

    let html = "";

    snapshot.forEach((doc) => {
      const data = doc.data();

      html += `
        <div style="margin:10px; padding:10px; border:1px solid #ccc;">
          <h3>${data.question}</h3>
          ${data.options.map(opt => `<p>${opt}</p>`).join("")}
        </div>
      `;
    });

    document.getElementById("questions").innerHTML = html;
  });
}

// 🔹 ADD QUESTION (ADMIN)
window.addQuestion = async function() {
  const question = prompt("Enter question:");

  if (!question) return;

  const options = [
    prompt("Option 1"),
    prompt("Option 2"),
    prompt("Option 3"),
    prompt("Option 4")
  ];

  await addDoc(collection(db, "exams"), {
    question: question,
    options: options
  });

  alert("Question added!");

  loadQuestions(); // refresh
}

// 🔹 LOAD ON START
loadQuestions();

</script>

</body>
</html>
